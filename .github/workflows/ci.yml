steps:
  - name: Checkout Repository
    # Action to pull the code from the repository
    uses: actions/checkout@v4

  - name: Set up Python ${{ matrix.python-version }}
    # Action to set up the specified Python environment
    uses: actions/setup-python@v5
    with:
      python-version: ${{ matrix.python-version }}
      # Use caching for pip dependencies to speed up future runs
      cache: 'pip'

  - name: Install Dependencies
    # Install project dependencies from requirements.txt, along with
    # development tools like pytest (testing) and flake8 (linting).
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install pytest flake8

  - name: Lint with Flake8
    # Run Flake8 to check for style guide violations (PEP 8) and common errors.
    run: |
      # Enforce mandatory style and syntax checks (E9, F63, F7, F82)
      echo "Running mandatory Flake8 checks..."
      flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      # Run general style checks, allowing all errors to be reported but not
      # fail the CI (exit-zero) if you prefer softer warnings.
      # We'll fail the job if any issues are found by default:
      echo "Running general Flake8 checks..."
      flake8 . --count --max-complexity=10 --max-line-length=100 --show-source --statistics

  - name: Run Pytest Tests
    # Execute unit and integration tests found in the project.
    # This step will fail the CI if any test fails.
    run: |
      pytest
